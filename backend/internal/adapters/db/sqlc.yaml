version: "2"
sql:
  - engine: "postgresql"
    queries: "sql"
    schema: "sql/schema.sql" # папка с вашими CREATE TABLE
    gen:
      go:
        package: "db"
        out: "gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_exact_table_names: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "bigserial"
            go_type: "int64"
          - db_type: "numeric"
            go_type: "float64"
